global
    log stdout format raw local0
    maxconn 100

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    # Retry on connection failure (e.g. replica not ready yet)
    retries 3

# ─── Write Port (5000) → Primary only ────────────────────────────────────────
# All INSERT, UPDATE, DELETE go here
# App uses DATABASE_URL pointing to this port
frontend write_frontend
    bind *:5000
    default_backend write_backend

backend write_backend
    # TCP health check — ping primary every 3s
    option  tcp-check
    server  primary db-primary:5432 check inter 3s rise 2 fall 3

# ─── Read Port (5001) → Primary + Replica round-robin ────────────────────────
# All SELECT queries go here, distributed evenly
# App uses REPLICA_URL pointing to this port
frontend read_frontend
    bind *:5001
    default_backend read_backend

backend read_backend
    balance roundrobin
    option  tcp-check
    # primary gets weight 1, replica gets weight 1 → 50/50 split
    # if replica goes down HAProxy auto-removes it, primary handles all reads
    server  primary db-primary:5432 check inter 3s rise 2 fall 3
    server  replica db-replica:5432 check inter 3s rise 2 fall 3

# ─── Stats Dashboard (8404) → http://localhost:8404/stats ────────────────────
# Shows live connection counts, server health, traffic per backend
frontend stats
    bind *:8404
    mode  http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
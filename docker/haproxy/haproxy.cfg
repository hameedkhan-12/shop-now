global
    log stdout format raw local0
    maxconn 100

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# Write Port (5000) - Primary only
frontend write_frontend
    bind *:5000
    default_backend write_backend

backend write_backend
    option  tcp-check
    server  primary db-primary:5432 check inter 3s rise 2 fall 3

# Read Port (5001) - Primary + Replica round-robin
frontend read_frontend
    bind *:5001
    default_backend read_backend

backend read_backend
    balance roundrobin
    option  tcp-check
    server  primary db-primary:5432 check inter 3s rise 2 fall 3
    server  replica db-replica:5432 check inter 3s rise 2 fall 3

# Stats Dashboard (8404)
listen stats
    bind *:8404
    mode  http
    option httplog
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node

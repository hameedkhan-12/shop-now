services:
  #Primary PostgreSQL (reads + writes)
  db-primary:
    image: bitnami/postgresql:latest
    container_name: ecommerce_db_primary
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: ecommerce
      # Replication config
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata_primary:/bitnami/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  #Read Replica (reads only, streams WAL from primary)
  db-replica:
    image: bitnami/postgresql:latest
    container_name: ecommerce_db_replica
    restart: unless-stopped
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      # Slave mode — Bitnami handles pg_basebackup internally
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: db-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata_replica:/bitnami/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  #HAProxy (TCP load balancer + router)
  haproxy:
    image: haproxy:2.9-alpine
    container_name: ecommerce_haproxy
    restart: unless-stopped
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    ports:
      - "5000:5000"   # write port → primary only
      - "5001:5001"   # read port  → primary + replica (round-robin)
      - "8404:8404"   # stats dashboard → http://localhost:8404/stats
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

volumes:
  pgdata_primary:
  pgdata_replica:
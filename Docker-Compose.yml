services:
  # Primary PostgreSQL (reads + writes)
  db-primary:
    image: bitnami/postgresql:latest
    container_name: ecommerce_db_primary
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: ecommerce
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata_primary:/bitnami/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Read Replica (streams WAL from primary)
  db-replica:
    image: bitnami/postgresql:latest
    container_name: ecommerce_db_replica
    restart: unless-stopped
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: db-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret
    ports:
      - "5434:5432"
    volumes:
      - pgdata_replica:/bitnami/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # HAProxy - built from custom Dockerfile to fix Windows CRLF issue
  haproxy:
    build:
      context: ./docker/haproxy
      dockerfile: Dockerfile
    container_name: ecommerce_haproxy
    restart: unless-stopped
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    ports:
      - "5000:5000"   # write port - primary only
      - "5001:5001"   # read port  - primary + replica round-robin
      - "8404:8404"   # stats dashboard

  api:
    image:
volumes:
  pgdata_primary:
  pgdata_replica:
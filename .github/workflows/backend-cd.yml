name: Backend CD

on:
  push:
    branches:
      - main

    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/api/Dockerfile"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ########################################################
      # Build API
      ########################################################

      - name: Build API Image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            --target runner \
            -t ${{ steps.login-ecr.outputs.registry }}/shop-now-api:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/shop-now-api:latest \
            .

      ########################################################
      # Build Migration
      ########################################################

      - name: Build Migration Image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            --target installer \
            -t ${{ steps.login-ecr.outputs.registry }}/shop-now-migrate:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/shop-now-migrate:latest \
            .

      ########################################################
      # Push Images
      ########################################################

      - name: Push API Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/shop-now-api:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/shop-now-api:latest

      - name: Push Migration Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/shop-now-migrate:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/shop-now-migrate:latest

      ########################################################
      # Deploy
      ########################################################

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd ~/shop-now

            echo "Updating repository..."
            git fetch origin
            git reset --hard origin/main

            echo "Writing image tags..."

            cat > .env <<EOF
            ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
            API_IMAGE_TAG=${{ github.sha }}
            HAPROXY_IMAGE_TAG=latest
            EOF

            echo "Verifying .env contents:"
            cat .env

            echo "Logging in to ECR on EC2..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            echo "Pulling latest images..."
            docker compose pull api migrate

            echo "Starting database..."
            docker compose up -d db-primary db-replica

            echo "Waiting for database..."
            sleep 10

            echo "Running migrations..."
            docker compose run --rm migrate

            echo "Starting API..."
            docker compose up -d api

            echo "Cleaning old images..."
            docker image prune -af

            echo "Deployment completed successfully!"
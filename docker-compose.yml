services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    container_name: shop-now-api

    env_file:
      - ./apps/api/.env

    depends_on:
      migrate:
        condition: service_completed_successfully

    ports:
      - "4000:4000"

    volumes:
      - .:/app
      - /app/node_modules

    restart: unless-stopped

    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    container_name: shop-now-migrate

    env_file:
      - ./apps/api/.env

    depends_on:
      haproxy:
        condition: service_started

    command:
      - sh
      - -c
      - |
        pnpm --filter @repo/db db:deploy && \
        pnpm --filter @repo/db db:seed

    volumes:
      - .:/app
      - /app/node_modules

    restart: "no"

    networks:
      - backend

  db-primary:
    image: bitnami/postgresql:latest

    container_name: ecommerce-db-primary

    restart: unless-stopped

    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: ecommerce

      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret

    volumes:
      - postgres_primary:/bitnami/postgresql

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - backend

  db-replica:
    image: bitnami/postgresql:latest

    container_name: ecommerce-db-replica

    restart: unless-stopped

    depends_on:
      db-primary:
        condition: service_healthy

    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: db-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432

      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres

      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_secret

    volumes:
      - postgres_replica:/bitnami/postgresql

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - backend

  haproxy:
    build:
      context: ./docker/haproxy
      dockerfile: Dockerfile

    container_name: ecommerce-haproxy

    restart: unless-stopped

    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy

    ports:
      - "5000:5000"
      - "5001:5001"
      - "8404:8404"

    networks:
      - backend

volumes:
  postgres_primary:
  postgres_replica:

networks:
  backend:
    driver: bridge